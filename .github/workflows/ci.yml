name: CI

on:
  push:
    branches: [main, "001-orchestrator"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=packages/orchestrator

      - name: TypeScript check
        run: npm run lint --workspace=packages/orchestrator

      - name: Run tests
        run: npm test --workspace=packages/orchestrator
